services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: skillproof
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: skillproof
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  pgdata:
